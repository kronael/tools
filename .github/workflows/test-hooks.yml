---
name: Test — hooks

on:
    push:
        paths: [hooks/**]
    pull_request:
        branches: [master]

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
            - run: pip install pytest
            - run: make -C hooks test
