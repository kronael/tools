---
name: Test — udfix

on:
    push:
        paths: [udfix/**]
    pull_request:
        branches: [master]

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: udfix/go.mod
            - run: cd udfix && go test ./...
            - run: cd udfix && go vet ./...
